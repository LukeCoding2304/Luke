<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --text: #e8e4dc;
      --muted: #666;
      --accent: #c8f04a;
      --accent-dim: rgba(200,240,74,0.12);
      --danger: #ff5f57;
      --warn: #ffbd2e;
      --info: #5ac8fa;
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 3rem 1rem 6rem;
      display: flex;
      justify-content: center;
    }

    .container { width: 100%; max-width: 560px; }

    header { margin-bottom: 2.5rem; }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 3rem;
      font-weight: normal;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); font-style: italic; }

    .header-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Add form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .form-row:last-child { margin-bottom: 0; }

    input[type="text"], input[type="datetime-local"], select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="datetime-local"]:focus,
    select:focus { border-color: var(--accent); }

    input[type="datetime-local"] { color-scheme: dark; }

    select option { background: #1a1a1a; }

    .priority-select { flex: 0 0 130px; }

    .btn-add {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn-add:hover { opacity: 0.85; }
    .btn-add:active { transform: scale(0.97); }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .filter-btn:hover { border-color: var(--text); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }

    /* Tasks */
    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.5rem 0 0.6rem;
    }

    ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.15s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }

    li::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }

    li.p-high::before { background: var(--danger); }
    li.p-medium::before { background: var(--warn); }
    li.p-low::before { background: var(--info); }
    li.done { opacity: 0.45; }

    li:hover { border-color: #3e3e3e; }

    .cb-wrap {
      padding-top: 2px;
      flex-shrink: 0;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    li.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 500;
    }

    .badge-high { background: rgba(255,95,87,0.15); color: var(--danger); }
    .badge-medium { background: rgba(255,189,46,0.15); color: var(--warn); }
    .badge-low { background: rgba(90,200,250,0.15); color: var(--info); }

    .due-label {
      font-size: 11px;
      color: var(--muted);
    }

    .due-label.overdue { color: var(--danger); }
    .due-label.soon { color: var(--warn); }
    .due-label.ok { color: var(--accent); }

    .notif-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 2px 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .notif-toggle.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .notif-toggle:hover { border-color: var(--text); color: var(--text); }

    .btn-del {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .btn-del:hover { color: var(--danger); }

    /* Empty */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 3rem 0;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 8px;
      transition: transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Stats bar */
    .stats {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
    }

    .stats span { color: var(--text); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Task<span>list.</span></h1>
    <p class="header-meta" id="date-line"></p>
  </header>

  <div class="form-card">
    <div class="form-row">
      <input type="text" id="task-input" placeholder="What needs doing?" />
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>
    <div class="form-row">
      <input type="datetime-local" id="due-input" style="flex:1;" />
      <select class="priority-select" id="priority-input">
        <option value="medium">— Priority —</option>
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🔵 Low</option>
      </select>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('overdue', this)">Overdue</button>
    <button class="filter-btn" onclick="setFilter('today', this)">Today</button>
  </div>

  <div class="stats" id="stats"></div>

  <ul id="task-list"></ul>
  <p class="empty" id="empty-msg" style="display:none;">Nothing here. Add a task above.</p>
</div>

<div id="toast"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks-v2') || '[]');
  let currentFilter = 'all';
  let notifPermission = false;

  // Ask for notification permission on load
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(p => { notifPermission = p === 'granted'; });
  } else if (Notification.permission === 'granted') {
    notifPermission = true;
  }

  document.getElementById('date-line').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function save() {
    localStorage.setItem('tasks-v2', JSON.stringify(tasks));
  }

  function addTask() {
    const text = document.getElementById('task-input').value.trim();
    if (!text) return;
    const due = document.getElementById('due-input').value;
    const priority = document.getElementById('priority-input').value;

    const task = {
      id: Date.now(),
      text,
      done: false,
      due: due || null,
      priority: priority || 'medium',
      notify: false,
      notifId: null,
      created: Date.now()
    };

    tasks.unshift(task);
    save();

    document.getElementById('task-input').value = '';
    document.getElementById('due-input').value = '';
    document.getElementById('priority-input').value = 'medium';

    render();
    showToast('Task added');
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
    showToast('Task deleted');
  }

  function toggleNotify(id) {
    const t = tasks.find(t => t.id === id);
    if (!t || !t.due) return;

    if (!notifPermission) {
      Notification.requestPermission().then(p => {
        notifPermission = p === 'granted';
        if (notifPermission) toggleNotify(id);
        else showToast('Notifications blocked');
      });
      return;
    }

    t.notify = !t.notify;

    if (t.notify) {
      const ms = new Date(t.due).getTime() - Date.now() - 15 * 60 * 1000;
      if (ms > 0) {
        t.notifId = setTimeout(() => {
          new Notification('Task reminder', { body: t.text, icon: '' });
        }, ms);
        showToast('Reminder set (15 min before)');
      } else {
        showToast('Due time is too soon for a reminder');
        t.notify = false;
      }
    } else {
      if (t.notifId) clearTimeout(t.notifId);
      t.notifId = null;
      showToast('Reminder removed');
    }

    save(); render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function dueStatus(due) {
    if (!due) return null;
    const now = Date.now();
    const d = new Date(due).getTime();
    const diff = d - now;
    if (diff < 0) return 'overdue';
    if (diff < 24 * 60 * 60 * 1000) return 'soon';
    return 'ok';
  }

  function formatDue(due) {
    if (!due) return '';
    const d = new Date(due);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const isTomorrow = d.toDateString() === new Date(now.getTime() + 86400000).toDateString();
    const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    if (isToday) return `today ${timeStr}`;
    if (isTomorrow) return `tomorrow ${timeStr}`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + timeStr;
  }

  function getFilteredTasks() {
    const now = Date.now();
    const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
    return tasks.filter(t => {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      if (currentFilter === 'overdue') return !t.done && t.due && new Date(t.due).getTime() < now;
      if (currentFilter === 'today') return t.due && new Date(t.due) <= todayEnd && new Date(t.due) >= new Date().setHours(0,0,0,0);
      return true;
    });
  }

  function render() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-msg');
    const statsEl = document.getElementById('stats');
    list.innerHTML = '';

    const filtered = getFilteredTasks();
    empty.style.display = filtered.length === 0 ? 'block' : 'none';

    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const overdue = tasks.filter(t => !t.done && t.due && new Date(t.due).getTime() < Date.now()).length;
    statsEl.innerHTML = `<span>${done}</span>/${total} done &nbsp;·&nbsp; <span style="color:${overdue>0?'var(--danger)':'var(--muted)'}">${overdue}</span> overdue`;

    filtered.forEach(task => {
      const li = document.createElement('li');
      li.classList.add(`p-${task.priority}`);
      if (task.done) li.classList.add('done');

      const status = dueStatus(task.due);

      li.innerHTML = `
        <div class="cb-wrap">
          <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleDone(${task.id})" />
        </div>
        <div class="task-body">
          <div class="task-text">${escHtml(task.text)}</div>
          <div class="task-meta">
            <span class="badge badge-${task.priority}">${task.priority}</span>
            ${task.due ? `<span class="due-label ${status || ''}">${status === 'overdue' ? '⚠ overdue · ' : status === 'soon' ? '⏰ ' : ''}${formatDue(task.due)}</span>` : ''}
            ${task.due ? `<button class="notif-toggle ${task.notify ? 'on' : ''}" onclick="toggleNotify(${task.id})">${task.notify ? '🔔 on' : '🔕 remind'}</button>` : ''}
          </div>
        </div>
        <button class="btn-del" onclick="deleteTask(${task.id})" title="Delete">×</button>
      `;

      list.appendChild(li);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Re-render every minute to update overdue status
  setInterval(render, 60000);

  render();
</script>
</body>
</html>
